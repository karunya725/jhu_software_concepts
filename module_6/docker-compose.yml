services:
  db:
    image: postgres:16
    container_name: gradcafe_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbit:
    image: rabbitmq:3.13-management
    container_name: gradcafe_rabbit
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: 
      context: .
      dockerfile: web/Dockerfile
    container_name: gradcafe_web
    env_file:
      - .env
    ports:
      - "8080:5000"
    depends_on:
      db:
        condition: service_healthy
      rabbit:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: gradcafe_worker
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    volumes:
      - ./data:/data:ro
    depends_on:
      db:
        condition: service_healthy
      rabbit:
        condition: service_healthy

volumes:
  pgdata: