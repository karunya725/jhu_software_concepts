services:
  db:
    image: postgres:16
    container_name: gradcafe_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gradcafe_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gradcafe_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbit:
    image: rabbitmq:3.13-management
    container_name: gradcafe_rabbit
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: ./web
    container_name: gradcafe_web
    ports:
      - "8080:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/gradcafe_db
      RABBITMQ_URL: amqp://guest:guest@rabbit:5672/
      FLASK_DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
      rabbit:
        condition: service_healthy

  worker:
    build: ./worker
    container_name: gradcafe_worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/gradcafe_db
      RABBITMQ_URL: amqp://guest:guest@rabbit:5672/
    depends_on:
      db:
        condition: service_healthy
      rabbit:
        condition: service_healthy

volumes:
  pgdata: