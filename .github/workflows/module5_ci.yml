name: Module 5 CI

on:
  push:
    branches:
      - main
    paths:
      - "module_5/**"
      - ".github/workflows/module5-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "module_5/**"
      - ".github/workflows/module5-ci.yml"
  workflow_dispatch:

jobs:
  module5-checks:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gradcafe_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d gradcafe_test_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gradcafe_test_db

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Install dependencies
        working-directory: module_5
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Run Pylint
        working-directory: module_5
        run: |
          python -m pylint --rcfile=.pylintrc src

      - name: Generate dependency graph
        working-directory: module_5
        run: |
          pydeps src --noshow -o dependency.svg

      - name: Run pytest with coverage
        working-directory: module_5
        run: |
          python -m pytest

      - name: Install Snyk
        run: |
          npm install -g snyk

      - name: Run Snyk dependency scan
        working-directory: module_5
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test --file=requirements.txt --package-manager=pip