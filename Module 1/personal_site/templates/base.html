<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Sets the character encoding for the webpage -->
    <meta charset="UTF-8">

    <!-- Title shown on the browser tab -->
    <title>Karunya's Personal Website</title>

    <!-- Bootstrap CSS from CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts used for typography -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Custom CSS file -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <!-- Top navigation bar -->
    <nav class="site-navbar">
        <div class="container-fluid px-5 site-navbar-content">

            <!-- Website name on the left side of the navbar -->
            <a class="site-logo" href="{{ url_for('pages.home') }}">
                KARUNYA
            </a>

            <!-- Navigation links on the top right -->
            <div class="site-nav">

                <a class="site-nav-link {% if active_page == 'home' %}nav-link-active{% endif %}"
                   href="{{ url_for('pages.home') }}">
                    Home
                </a>

                <a class="site-nav-link {% if active_page == 'contact' %}nav-link-active{% endif %}"
                   href="{{ url_for('pages.contact') }}">
                    Contact
                </a>

                <a class="site-nav-link {% if active_page == 'projects' %}nav-link-active{% endif %}"
                   href="{{ url_for('pages.projects') }}">
                    Projects
                </a>

            </div>
        </div>
    </nav>

    <!-- Page-specific content appears here -->
    <main>
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
